# Phase 3 Vector Store Configuration

# ChromaDB configuration
backend: "chroma"
collection_name: "mf_faq_chunks"
persist_directory: "./data/index/chroma"

# Distance metric
distance_metric: "cosine"  # Options: cosine, l2, ip

# Index settings
allow_reset: true
anonymized_telemetry: false

# Storage settings
index_type: "hnsw"  # For ChromaDB HNSW index
hnsw_space: "cosine"
hnsw_M: 16
hnsw_ef_construction: 200

# Logging
log_level: "INFO"
