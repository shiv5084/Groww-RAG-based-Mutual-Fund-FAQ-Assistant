# Golden set test fixtures for Phase 4 router validation
# Expected route classifications for test queries

# Advisory queries - should route to ADVISORY
advisory_queries:
  - query: "Which mutual fund is best for investment?"
    expected_route: "advisory"
    confidence_threshold: 0.6
    reasoning: "Contains 'best' and 'investment' - comparative advice"
  
  - query: "Should I invest in ELSS or PPF?"
    expected_route: "advisory"
    confidence_threshold: 0.7
    reasoning: "Contains 'should I' and comparison between schemes"
  
  - query: "Is HDFC Top 100 Fund a good investment?"
    expected_route: "advisory"
    confidence_threshold: 0.6
    reasoning: "Contains 'good investment' - seeking advice"
  
  - query: "What do you think about Axis Bluechip Fund?"
    expected_route: "advisory"
    confidence_threshold: 0.5
    reasoning: "Contains 'think about' - seeking opinion"
  
  - query: "Recommend a mutual fund for long-term goals"
    expected_route: "advisory"
    confidence_threshold: 0.7
    reasoning: "Contains 'recommend' - direct advice request"
  
  - query: "Compare SIP vs lumpsum investment"
    expected_route: "advisory"
    confidence_threshold: 0.8
    reasoning: "Contains 'compare' - comparative request"
  
  - query: "Which is better: equity or debt funds?"
    expected_route: "advisory"
    confidence_threshold: 0.8
    reasoning: "Contains 'better' and comparison"
  
  - query: "How should I allocate my portfolio?"
    expected_route: "advisory"
    confidence_threshold: 0.7
    reasoning: "Contains 'should I' and 'portfolio' - advice request"

# Performance queries - should route to PERFORMANCE
performance_queries:
  - query: "What are the returns of HDFC Top 100 Fund?"
    expected_route: "performance"
    confidence_threshold: 0.7
    reasoning: "Contains 'returns' - performance inquiry"
  
  - query: "Show me the historical performance of Axis Bluechip"
    expected_route: "performance"
    confidence_threshold: 0.8
    reasoning: "Contains 'historical performance'"
  
  - query: "What is the NAV of SBI Bluechip Fund?"
    expected_route: "performance"
    confidence_threshold: 0.7
    reasoning: "Contains 'NAV' - performance metric"
  
  - query: "How has ELSS performed over the last 5 years?"
    expected_route: "performance"
    confidence_threshold: 0.8
    reasoning: "Contains 'performed' and '5 years'"
  
  - query: "What is the profit percentage of mutual funds?"
    expected_route: "performance"
    confidence_threshold: 0.6
    reasoning: "Contains 'profit percentage'"
  
  - query: "Show me the growth rate of ICICI Prudential Fund"
    expected_route: "performance"
    confidence_threshold: 0.7
    reasoning: "Contains 'growth rate'"
  
  - query: "What is the exit load for HDFC Midcap Fund?"
    expected_route: "performance"
    confidence_threshold: 0.7
    reasoning: "Contains 'exit load' - fee/performance related"
  
  - query: "How much will my investment grow in 3 years?"
    expected_route: "performance"
    confidence_threshold: 0.6
    reasoning: "Contains 'grow' and '3 years'"

# Factual queries - should route to FACTUAL
factual_queries:
  - query: "What is ELSS mutual fund?"
    expected_route: "factual"
    confidence_threshold: 0.8
    reasoning: "Contains 'what is' and 'ELSS' - factual inquiry"
  
  - query: "How do I open a mutual fund account?"
    expected_route: "factual"
    confidence_threshold: 0.8
    reasoning: "Contains 'how do I' and 'open account' - process inquiry"
  
  - query: "Explain the KYC process for mutual funds"
    expected_route: "factual"
    confidence_threshold: 0.9
    reasoning: "Contains 'explain' and 'KYC process'"
  
  - query: "What documents are required for mutual fund investment?"
    expected_route: "factual"
    confidence_threshold: 0.7
    reasoning: "Contains 'what documents' - factual information"
  
  - query: "How does mutual fund redemption work?"
    expected_route: "factual"
    confidence_threshold: 0.8
    reasoning: "Contains 'how does' and 'redemption' - process inquiry"
  
  - query: "What is the lock-in period for ELSS?"
    expected_route: "factual"
    confidence_threshold: 0.8
    reasoning: "Contains 'what is' and 'lock-in period'"
  
  - query: "Explain the different types of mutual funds"
    expected_route: "factual"
    confidence_threshold: 0.7
    reasoning: "Contains 'explain' and 'types' - factual information"
  
  - query: "What is the minimum investment amount for SIP?"
    expected_route: "factual"
    confidence_threshold: 0.7
    reasoning: "Contains 'what is' and 'minimum investment'"
  
  - query: "How to switch between mutual fund schemes?"
    expected_route: "factual"
    confidence_threshold: 0.8
    reasoning: "Contains 'how to' and 'switch' - process inquiry"
  
  - query: "What are the tax benefits of ELSS?"
    expected_route: "factual"
    confidence_threshold: 0.7
    reasoning: "Contains 'what are' and 'tax benefits'"

# Edge cases - queries that could be ambiguous
edge_cases:
  - query: "ELSS returns vs PPF returns"
    expected_route: "advisory"
    confidence_threshold: 0.6
    reasoning: "Contains 'vs' comparison - should be advisory"
  
  - query: "What are the returns of ELSS under Section 80C?"
    expected_route: "performance"
    confidence_threshold: 0.6
    reasoning: "Contains 'returns' but also tax context - performance prioritized"
  
  - query: "How good are the returns of ELSS?"
    expected_route: "advisory"
    confidence_threshold: 0.5
    reasoning: "Contains 'good' and 'returns' - advisory due to 'good'"
  
  - query: "Explain the performance of ELSS funds"
    expected_route: "factual"
    confidence_threshold: 0.6
    reasoning: "Contains 'explain' and 'performance' - factual inquiry"

# Test configuration
test_config:
  minimum_accuracy_threshold: 0.90  # 90% accuracy required
  confidence_check: true  # Check confidence thresholds
  detailed_logging: true  # Log detailed results
  batch_size: 10  # Process queries in batches
