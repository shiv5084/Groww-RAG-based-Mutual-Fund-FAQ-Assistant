services:
  - type: web
    name: Groww-RAG-MutualFundFAQAssistant-backend
    env: python
    plan: free
    region: oregon # Or your preferred Render region
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-en-v1.5')"
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker --timeout 120 src.phase7_api.main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false # Set to Vercel origin URLs (comma-separated)
    autoDeploy: true
